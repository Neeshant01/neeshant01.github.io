<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nishant Kumar</title>
  <meta name="description" content="Simple personal page of Nishant Kumar.">
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #050505;
      color: #f5f5f5;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    main {
      max-width: 560px;
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2.2rem, 7vw, 4rem);
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      margin-bottom: 12px;
      color: #d4d4d4;
    }

    .tagline {
      font-size: 1rem;
      color: #a3a3a3;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hi, I am Nishant Kumar</h1>
    <p class="subtitle">I am a Student Developer</p>
    <p class="tagline">Simple idea and better expression</p>
  </main>
</body>
</html>
